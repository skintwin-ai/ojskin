<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKZ Agent Chat - OJSkin LLM Inference</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
        }
        
        .light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --accent: #0969da;
            --accent-hover: #0550ae;
            --border: #d0d7de;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .theme-toggle:hover {
            background: var(--border);
        }
        
        main {
            flex: 1;
            display: flex;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            gap: 1rem;
        }
        
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .sidebar h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        
        .model-status {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        
        .status-dot.ready {
            background: var(--success);
        }
        
        .status-dot.loading {
            background: var(--warning);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .model-info {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .model-info div {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
        }
        
        .agent-selector {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .agent-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            cursor: pointer;
            color: var(--text-primary);
            text-align: left;
            transition: all 0.2s;
        }
        
        .agent-btn:hover {
            border-color: var(--accent);
        }
        
        .agent-btn.active {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }
        
        .agent-btn .agent-name {
            font-weight: 500;
        }
        
        .agent-btn .agent-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: var(--accent);
            color: white;
        }
        
        .message-content {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }
        
        .message.user .message-content {
            background: var(--accent);
            color: white;
        }
        
        .message-content pre {
            background: var(--bg-primary);
            border-radius: 6px;
            padding: 0.75rem;
            overflow-x: auto;
            margin-top: 0.5rem;
        }
        
        .message-content code {
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.875rem;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .chat-input-container {
            border-top: 1px solid var(--border);
            padding: 1rem;
            background: var(--bg-secondary);
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            min-height: 44px;
            max-height: 200px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .send-btn:hover {
            background: var(--accent-hover);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .load-model-section {
            margin-top: auto;
        }
        
        .load-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .load-btn:hover {
            background: var(--accent-hover);
        }
        
        .load-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-bar {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
        
        .stats {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">SKZ</div>
            <span class="logo-text">SKZ Agent Chat</span>
        </div>
        <div class="header-controls">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
                <span id="theme-text">Dark</span>
            </button>
        </div>
    </header>
    
    <main>
        <aside class="sidebar">
            <div class="model-status">
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Not loaded</span>
                </div>
                <div class="model-info" id="model-info">
                    <div><span>Model:</span><span id="model-name">-</span></div>
                    <div><span>Context:</span><span id="model-ctx">-</span></div>
                    <div><span>Params:</span><span id="model-params">-</span></div>
                </div>
            </div>
            
            <div>
                <h3>Agent Type</h3>
                <div class="agent-selector" id="agent-selector">
                    <button class="agent-btn active" data-task="0">
                        <div class="agent-name">General Assistant</div>
                        <div class="agent-desc">General purpose chat</div>
                    </button>
                    <button class="agent-btn" data-task="1">
                        <div class="agent-name">Research Discovery</div>
                        <div class="agent-desc">Academic literature analysis</div>
                    </button>
                    <button class="agent-btn" data-task="2">
                        <div class="agent-name">Submission Assistant</div>
                        <div class="agent-desc">Manuscript preparation</div>
                    </button>
                    <button class="agent-btn" data-task="3">
                        <div class="agent-name">Editorial</div>
                        <div class="agent-desc">Workflow management</div>
                    </button>
                    <button class="agent-btn" data-task="5">
                        <div class="agent-name">Quality Assurance</div>
                        <div class="agent-desc">Publication standards</div>
                    </button>
                </div>
            </div>
            
            <div class="load-model-section">
                <h3>Model</h3>
                <select id="model-select" style="width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);">
                    <option value="models/qwen2-0.5b-instruct-q4_0.gguf">Qwen2-0.5B (350MB)</option>
                    <option value="models/smollm-360m-instruct-q4_0.gguf">SmolLM-360M (220MB)</option>
                    <option value="models/tinyllama-1.1b-chat-q4_0.gguf">TinyLlama-1.1B (670MB)</option>
                </select>
                <button class="load-btn" id="load-btn" onclick="loadModel()">Load Model</button>
                <div class="progress-bar" id="progress-bar" style="display: none;">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="stats" id="stats"></div>
            </div>
        </aside>
        
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p>Welcome to SKZ Agent Chat! Load a model to start chatting with the autonomous agents.</p>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea 
                        class="chat-input" 
                        id="chat-input" 
                        placeholder="Type your message..."
                        rows="1"
                        disabled
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>Send</button>
                </div>
            </div>
        </div>
    </main>
    
    <script type="module">
        import { LlamaChat, SKZAgent, SKZ_TASK } from './llama-client.js';
        
        let chat = null;
        let currentTask = 0;
        let isGenerating = false;
        
        // Initialize
        window.addEventListener('load', async () => {
            // Set up agent selector
            document.querySelectorAll('.agent-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTask = parseInt(btn.dataset.task);
                    
                    if (chat) {
                        updateSystemPrompt();
                    }
                });
            });
            
            // Set up input
            const input = document.getElementById('chat-input');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 200) + 'px';
            });
        });
        
        // Theme toggle
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').textContent = isLight ? '☀️' : '🌙';
            document.getElementById('theme-text').textContent = isLight ? 'Light' : 'Dark';
        };
        
        // Load model
        window.loadModel = async () => {
            const loadBtn = document.getElementById('load-btn');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const modelSelect = document.getElementById('model-select');
            
            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            progressBar.style.display = 'block';
            statusDot.className = 'status-dot loading';
            statusText.textContent = 'Loading...';
            
            try {
                chat = new LlamaChat({
                    workerPath: './worker.js',
                    systemPrompt: getSystemPrompt(currentTask)
                });
                
                await chat.init();
                
                await chat.loadModel(modelSelect.value, {
                    onDownloadProgress: (data) => {
                        progressFill.style.width = data.percent + '%';
                        statusText.textContent = `Downloading: ${data.percent}%`;
                    },
                    onProgress: (data) => {
                        progressFill.style.width = data.percent + '%';
                        statusText.textContent = `Loading: ${data.percent}%`;
                    }
                });
                
                // Update UI
                const info = chat.getInfo();
                document.getElementById('model-name').textContent = info.name || 'Unknown';
                document.getElementById('model-ctx').textContent = info.n_ctx || '-';
                document.getElementById('model-params').textContent = formatParams(info);
                
                statusDot.className = 'status-dot ready';
                statusText.textContent = 'Ready';
                
                document.getElementById('chat-input').disabled = false;
                document.getElementById('send-btn').disabled = false;
                
                addMessage('assistant', `Model loaded! I'm ready to help as your ${getAgentName(currentTask)}.`);
                
            } catch (error) {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Error';
                addMessage('assistant', `Error loading model: ${error.message}`);
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = 'Load Model';
                progressBar.style.display = 'none';
            }
        };
        
        // Send message
        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const content = input.value.trim();
            
            if (!content || !chat || isGenerating) return;
            
            isGenerating = true;
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            
            addMessage('user', content);
            
            // Add typing indicator
            const typingId = addTypingIndicator();
            
            try {
                const startTime = performance.now();
                let response = '';
                
                for await (const token of chat.stream(content)) {
                    response += token;
                    updateTypingMessage(typingId, response);
                }
                
                const elapsed = performance.now() - startTime;
                const stats = await chat.getStats();
                
                document.getElementById('stats').textContent = 
                    `${stats.tokens_generated} tokens in ${(elapsed/1000).toFixed(2)}s (${stats.tokens_per_second.toFixed(1)} tok/s)`;
                
            } catch (error) {
                updateTypingMessage(typingId, `Error: ${error.message}`);
            } finally {
                removeTypingIndicator(typingId);
                isGenerating = false;
                sendBtn.disabled = false;
            }
        };
        
        // Helper functions
        function addMessage(role, content) {
            const messages = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">
                    <p>${escapeHtml(content)}</p>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addTypingIndicator() {
            const messages = document.getElementById('chat-messages');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message';
            div.id = id;
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return id;
        }
        
        function updateTypingMessage(id, content) {
            const div = document.getElementById(id);
            if (div) {
                div.querySelector('.message-content').innerHTML = `<p>${escapeHtml(content)}</p>`;
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            }
        }
        
        function removeTypingIndicator(id) {
            // Keep the message, just remove the typing class
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatParams(info) {
            if (!info) return '-';
            const params = info.n_embd * info.n_layer;
            if (params > 1e9) return (params / 1e9).toFixed(1) + 'B';
            if (params > 1e6) return (params / 1e6).toFixed(0) + 'M';
            return params.toString();
        }
        
        function getSystemPrompt(task) {
            const prompts = {
                0: 'You are a helpful AI assistant.',
                1: 'You are a research discovery agent specializing in academic literature analysis for cosmetic science.',
                2: 'You are a submission assistant agent helping authors prepare manuscripts for academic journals.',
                3: 'You are an editorial orchestration agent managing publication workflows efficiently.',
                5: 'You are a content quality agent ensuring publication standards and scientific rigor.'
            };
            return prompts[task] || prompts[0];
        }
        
        function getAgentName(task) {
            const names = {
                0: 'General Assistant',
                1: 'Research Discovery Agent',
                2: 'Submission Assistant Agent',
                3: 'Editorial Orchestration Agent',
                5: 'Quality Assurance Agent'
            };
            return names[task] || 'Assistant';
        }
        
        function updateSystemPrompt() {
            if (chat) {
                chat.setSystemPrompt(getSystemPrompt(currentTask));
                chat.clear();
                addMessage('assistant', `Switched to ${getAgentName(currentTask)} mode. How can I help you?`);
            }
        }
    </script>
</body>
</html>
