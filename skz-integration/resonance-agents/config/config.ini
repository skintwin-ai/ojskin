; SKZ Resonance Agents Configuration
; Copy to config.ini and modify values as needed

[app]
env = development
name = "SKZ Agents Framework"
esbuild_metafile = esbuild-meta.json

[database]
default = pgsql
log_queries = false

[database.pgsql]
driver = pgsql
host = localhost
port = 5432
database = skz_agents
username = skz_user
password = skz_password
pool_size = 16

[database.mysql]
driver = mysql
host = localhost
port = 3306
database = ojs
username = ojs_user
password = ojs_password
pool_size = 8

[http]
host = 0.0.0.0
port = 9501
max_connections = 10000
max_concurrency = 10000

[swoole]
log_level = SWOOLE_LOG_NOTICE
max_coroutines = 100000

[redis]
host = localhost
port = 6379
timeout = 1.0
db_index = 0
pool_size = 32

[llm]
; LLM Configuration for AI-powered agents
enabled = true
host = 127.0.0.1
port = 8089
model_path = /models/llama-2-7b-chat.Q4_K_M.gguf
context_size = 4096
n_threads = 4

[websocket]
enabled = true
port = 9502
heartbeat_interval = 30
max_connections = 5000

[agents]
; Agent-specific configurations
research_discovery_enabled = true
manuscript_analysis_enabled = true
peer_review_enabled = true
editorial_decision_enabled = true
publication_formatting_enabled = true
quality_assurance_enabled = true
workflow_orchestration_enabled = true

[ojs]
; OJS Integration
api_url = http://localhost:8000/api/v1
api_key = your_ojs_api_key
api_secret = your_ojs_api_secret

[logging]
level = debug
channel = stderr
